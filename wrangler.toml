name = "servio"
main = "src/worker.js"
compatibility_date = "2026-06-26"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
run_worker_first = [
  "/",
  "/module-menu",
  "/overview",
  "/incarcare-curba-sarcina",
  "/battery-revenue-simulator",
  "/battery-calculator",
  "/day-ahead",
  "/day-ahead-operations",
  "/future-scenarios",
  "/electricity-map",
  "/relay-sources",
  "/api/*"
]

